# 安全配置
security:
  session:
    type: jwt # 会话方式 jwt/redis-token
#    access-token-time-to-live: -1   # 访问令牌 有效期(单位：秒)，默认 2 小时，-1 表示永不过期
#    refresh-token-time-to-live: 604800 # 刷新令牌有效期(单位：秒)，默认 7 天，-1 表示永不过期
    access-token-time-to-live: 60   # 访问令牌 有效期(单位：秒)，默认 2 小时，-1 表示永不过期
    refresh-token-time-to-live: 120 # 刷新令牌有效期(单位：秒)，默认 7 天，-1 表示永不过期
    jwt:
      secret-key: uO3dIi5RseUEdi6UKXhZSlpO4ZIfC9S9 # JWT密钥(HS256算法至少32字符)
    redis-token:
      allow-multi-login: true # 是否允许多设备登录
  # 安全白名单路径，仅跳过 AuthorizationFilter 过滤器，还是会走 Spring Security 的其他过滤器(CSRF、CORS等)
  ignore-urls:
    - ${server.error.path:${error.path:/error}}
    - /**/login              #登录
    - /**/sign-up            # 注册
    - /auth/logout                # 登出
    - /auth/token/refresh-token  # 刷新令牌接口
    - /ws/**                # WebSocket接口
    - /mails/**
    - /im*/**
  # 非安全端点路径，完全绕过 Spring Security 的安全控制
  unsecured-urls:
    - ${springdoc.swagger-ui.path}
    - /actuator/**
    - /doc.html
    - /swagger-ui/**
    - /v3/api-docs/**
    - /webjars/**
    - /favicon.ico
