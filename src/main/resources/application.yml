server:
  port: 8080
  servlet:
    context-path: /im

logging:
  level:
    ROOT: INFO
    com.feilong: DEBUG

spring:
  application:
    name: netty-im
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/im?useUnicode=true&useSSL=false&allowMultiQueries=true&characterEncoding=utf8&serverTimezone=GMT%2B8&createDatabaseIfNotExist=true
    username: root
    password: l(=8gp_04h*&
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开启SQL日志
    map-underscore-to-camel-case: true # 下划线转驼峰
  global-config:
    db-config:
      id-type: auto # 主键策略
      logic-delete-field: deleted # 逻辑删除字段
      logic-delete-value: 1 # 删除值
      logic-not-delete-value: 0 # 未删除值
  mapper-locations: classpath:mapper/*.xml # XML映射文件位置


im:
  netty:
    host: 0.0.0.0
    port: 8081
    path: ${server.servlet.context-path}
    boss-thread-count: 1
    worker-thread-count: 4


# 安全配置
security:
  session:
    type: jwt # 会话方式 jwt/redis-token
    access-token-time-to-live: 7200   # 访问令牌 有效期(单位：秒)，默认 2 小时，-1 表示永不过期
    refresh-token-time-to-live: 604800 # 刷新令牌有效期(单位：秒)，默认 7 天，-1 表示永不过期
    jwt:
      secret-key: SecretKey012345678901234567890123456789012345678901234567890123456789 # JWT密钥(HS256算法至少32字符)
    redis-token:
      allow-multi-login: true # 是否允许多设备登录
  # 安全白名单路径，仅跳过 AuthorizationFilter 过滤器，还是会走 Spring Security 的其他过滤器(CSRF、CORS等)
  ignore-urls:
    - ${server.error.path:${error.path:/error}}
    - /im-user/sign-up
    - /auth/*/login/**     # 登录接口(账号密码登录、手机验证码登录和微信登录)
    - /auth/token/refresh-token  # 刷新令牌接口
    - /auth/
    - /auth/captcha        # 验证码获取接口
    - /auth/logout         # 开放退出登录
    - /ws/**               # WebSocket接口
    - /mails/**
  # 非安全端点路径，完全绕过 Spring Security 的安全控制
  unsecured-urls:
    - ${springdoc.swagger-ui.path}
    - /doc.html
    - /swagger-ui/**
    - /v3/api-docs/**
    - /webjars/**
    - /favicon.ico

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html     # 文档访问路径
    tags-sorter: alpha         # 标签排序方式
    operations-sorter: method   # 接口排序方式
  api-docs:
    path: /v3/api-docs         # OpenAPI JSON路径
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  default-flat-param-object: true
  # 可选：只扫描特定包下的 Controller，加快启动速度
  packages-to-scan: com.feilong.im.controller

knife4j:
  # 是否启用增强模式
  enable: true
  # 跨域配置（方便前后端分离对接）
  cors: true
